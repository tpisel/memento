name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    name: just check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Run checks
        run: just check
