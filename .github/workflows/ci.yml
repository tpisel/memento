name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    name: just check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install just on Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y just

      - name: Install just on macOS
        if: runner.os == 'macOS'
        run: brew install just

      - name: Run checks
        run: just check
